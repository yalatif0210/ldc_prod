# ─────────────────────────────────────────────────────────────
# Override LOCAL — PostgreSQL local (host), sans SSL
# Usage : docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
# ─────────────────────────────────────────────────────────────

services:

  lab_db:
    volumes:
      - lab_db_data:/var/lib/postgresql/data
      - ./ldc_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  ldc_backend:
    ports:
      - "8081:8080"     # accès direct API (Swagger, Postman)
    environment:
      # Pointe vers PostgreSQL local via host.docker.internal (Docker Desktop Windows/Mac)
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/${POSTGRES_DB:-lab_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-}
      APP_CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:4200"
      JWT_SECRET: ${JWT_SECRET:-bG9jYWwtc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktMzI=}
    develop:
      watch:
        - action: rebuild
          path: ./ldc_backend/src
        - action: rebuild
          path: ./ldc_backend/pom.xml

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://localhost/grafana/
    ports:
      - "3000:3000"

  ldc_frontend:
    ports:
      - "80:80"
    volumes:
      - ./ldc_frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf.template:ro
    environment:
      DOMAIN: localhost
      BASE_URL: http://localhost
      API_BASE_URL: http://localhost
      API_BASE_PORT: "80"
      GRAPHQL_END_POINT: /graphql
      API_REST_END_POINT: /api
    depends_on:
      - ldc_backend
    develop:
      watch:
        - action: rebuild
          path: ./ldc_frontend/src
        - action: rebuild
          path: ./ldc_frontend/package.json

volumes:
  lab_db_data:
  grafana_data:
  certbot_certs:
    external: false

networks:
  default:
  shared_db_net:
    external: false
