
services:

  lab_db:
    image: postgres:15-alpine
    container_name: lab_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
    volumes:
      - lab_db_data:/var/lib/postgresql/data
      - ./ldc_db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - default
      - shared_db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  ldc_backend:
    build:
      context: ./ldc_backend
      dockerfile: Dockerfile
    container_name: ldc_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://lab_db:5432/${POSTGRES_DB:-appdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      lab_db:
        condition: service_healthy
    healthcheck:
      disable: true

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      lab_db:
        condition: service_healthy
    networks:
      - default

  support_db:
    image: postgres:16-alpine
    container_name: support_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUPPORT_POSTGRES_DB:-support_db}
      POSTGRES_USER: ${SUPPORT_POSTGRES_USER:-support_user}
      POSTGRES_PASSWORD: ${SUPPORT_POSTGRES_PASSWORD:-support_pass}
    volumes:
      - support_db_data:/var/lib/postgresql/data
    networks:
      - support_internal
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  support_bot:
    build:
      context: ./support_ldc
      dockerfile: Dockerfile
    container_name: support_bot
    restart: unless-stopped
    depends_on:
      support_db:
        condition: service_healthy
    env_file:
      - ./support_ldc/.env
    environment:
      DATABASE_URL: postgresql://${SUPPORT_POSTGRES_USER:-support_user}:${SUPPORT_POSTGRES_PASSWORD:-support_pass}@support_db:5432/${SUPPORT_POSTGRES_DB:-support_db}
    expose:
      - "5000"
    volumes:
      - support_qr_codes:/app/qr_codes
    networks:
      - support_internal
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ldc_frontend:
    build:
      context: ./ldc_frontend
      dockerfile: Dockerfile
    container_name: ldc_frontend
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      BASE_URL: ${BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      API_BASE_PORT: ${API_BASE_PORT}
      GRAPHQL_END_POINT: ${GRAPHQL_END_POINT}
      API_REST_END_POINT: ${API_REST_END_POINT}
    depends_on:
      - ldc_backend
      - support_bot
    healthcheck:
      disable: true
    ports:
      - "443:443"
    volumes:
      # Certificats Let's Encrypt (lecture seule dans nginx)
      - certbot_certs:/etc/letsencrypt:ro


volumes:
  lab_db_data:
  grafana_data:
  support_db_data:
  support_qr_codes:
  certbot_certs:
    external: true  # Créé par init-letsencrypt.sh — même nom partagé avec certbot

networks:
  default:
  support_internal:
    driver: bridge
    internal: true              # DB support isolée d'internet
  shared_db_net:
    external: true  # docker network create shared_db_net  +  docker network connect shared_db_net pgadmin
