# ─────────────────────────────────────────────────────────────
# HTTPS uniquement (port 80 géré par un autre conteneur)
# ─────────────────────────────────────────────────────────────
server {
  listen 443 ssl;
  http2 on;
  server_name ${DOMAIN};

  # Certificats gérés par Certbot
  ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

  # ── Protocoles & chiffrement (Mozilla Intermediate, 2024) ──
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers off;

  # ── Session TLS ──
  ssl_session_timeout 1d;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_tickets off;

  # ── OCSP Stapling ──
  ssl_stapling        on;
  ssl_stapling_verify on;
  # Docker DNS (127.0.0.11) pour résolution différée des upstreams optionnels
  resolver            127.0.0.11 1.1.1.1 8.8.8.8 valid=30s;
  resolver_timeout    5s;

  # ── En-têtes de sécurité ──
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options           SAMEORIGIN                                     always;
  add_header X-Content-Type-Options    nosniff                                        always;
  add_header Referrer-Policy           "no-referrer-when-downgrade"                   always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

  root  /usr/share/nginx/html;
  index index.html;

  # Angular SPA (HTML5 pushState)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # REST API → Spring Boot
  location /api/ {
    proxy_http_version 1.1;
    proxy_pass         http://ldc_backend:8080;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
  }

  # GraphQL → Spring Boot
  location /graphql {
    proxy_http_version 1.1;
    proxy_pass         http://ldc_backend:8080;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
  }

  # WebSocket / SockJS → Spring Boot
  location /ws/ {
    proxy_pass         http://ldc_backend:8080;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
  }

  # ── Support Bot Telegram → Flask:5000 ──────────────────────
  location /support/ {
    proxy_pass         http://support_bot:5000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
  }

  # Grafana (résolution différée via variable — Nginx démarre même si grafana est absent)
  location /grafana/ {
    proxy_pass         http://grafana:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
  }

  ## Webhook Twilio WhatsApp (URL publique pour Twilio)
  #location /webhook/whatsapp {
  #  set $support_upstream http://support_bot:5000;
  #  proxy_pass         $support_upstream/webhook/whatsapp;
